<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeoStudio | AI Video Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #ededed; }
        .glass-panel {
            background: rgba(15, 15, 17, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-input:focus { border-color: #8b5cf6; outline: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-6 items-center justify-center">

    <main class="w-full max-w-4xl glass-panel rounded-2xl p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="flex flex-col gap-6">
            <div>
                <h1 class="text-2xl font-bold mb-2 tracking-wide">Veo<span class="text-neutral-500 font-light">Studio</span></h1>
                <p class="text-xs text-neutral-400">Powered by Veo 2.0 (veo-2.0-generate-001)</p>
            </div>

            <div>
                <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-widest mb-2">Scene Director Prompt</label>
                <textarea id="promptInput" rows="5" class="w-full glass-input rounded-xl p-4 text-sm resize-none" placeholder="Describe your cinematic scene..."></textarea>
            </div>

            <button id="generateBtn" onclick="generateRealVideo()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-purple-500/20">
                Generate 8s Video
            </button>
        </div>

        <div class="flex flex-col relative bg-[#0a0a0c] rounded-xl overflow-hidden border border-white/10 min-h-[300px] items-center justify-center">
            
            <video id="videoPlayer" class="absolute inset-0 w-full h-full object-cover hidden" controls autoplay loop></video>

            <div id="loadingUI" class="hidden flex-col items-center justify-center p-6 text-center z-10 bg-[#0a0a0c]/80 w-full h-full">
                <svg class="animate-spin w-12 h-12 text-purple-500 mb-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <h3 class="font-bold text-white mb-1" id="statusTitle">Veo is generating...</h3>
                <p class="text-xs text-neutral-400">This usually takes 1 to 3 minutes.</p>
            </div>
            
            <a id="downloadBtn" class="absolute bottom-4 right-4 bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20 text-white px-4 py-2 rounded-lg text-xs font-bold hidden transition-colors z-20">
                Download .mp4
            </a>
        </div>
    </main>

    <script>
        async function generateRealVideo() {
            const prompt = document.getElementById('promptInput').value;
            if(!prompt) return alert("Please enter a prompt first.");

            const btn = document.getElementById('generateBtn');
            const loader = document.getElementById('loadingUI');
            const player = document.getElementById('videoPlayer');
            const dlBtn = document.getElementById('downloadBtn');

            // Set Loading UI
            btn.disabled = true;
            btn.classList.add('opacity-50');
            player.classList.add('hidden');
            dlBtn.classList.add('hidden');
            loader.classList.remove('hidden');
            loader.classList.add('flex');

            try {
                // Call our local Python Flask server
                const response = await fetch('http://127.0.0.1:5000/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if (!response.ok || data.error) {
                    throw new Error(data.error || "Server error occurred");
                }

                // Success! Play the video
                player.src = data.video_url;
                player.classList.remove('hidden');
                
                dlBtn.href = data.video_url;
                dlBtn.download = `veo-generation-${Date.now()}.mp4`;
                dlBtn.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("Generation Failed: " + error.message);
            } finally {
                // Reset UI
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                loader.classList.add('hidden');
                loader.classList.remove('flex');
            }
        }
    </script>
</body>
</html>
