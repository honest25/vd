<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veo 3.1 Studio | IRESH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #030712; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .upload-zone { border: 2px dashed rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
        .upload-zone:hover { border-color: #6366f1; background: rgba(99, 102, 241, 0.05); }
        /* Animated Background */
        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.1), transparent 30%),
                        radial-gradient(circle at 85% 30%, rgba(147, 51, 234, 0.1), transparent 30%);
            filter: blur(60px); animation: pulse 8s ease-in-out infinite alternate;
        }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4 relative overflow-x-hidden">
    
    <div class="animated-bg"></div>

    <main class="w-full max-w-4xl space-y-8 z-10">
        <header class="text-center">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">
                Veo 3.1 Fast Studio
            </h1>
            <p class="text-gray-400 mt-2">Cinematic AI Video Synthesis</p>
        </header>

        <form id="video-form" class="glass-panel rounded-2xl p-8 space-y-6 relative">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-300 flex justify-between">
                        <span><i class="fa-solid fa-image"></i> Start Frame</span>
                        <span class="text-xs text-gray-500">(Optional)</span>
                    </label>
                    <div class="upload-zone rounded-xl h-40 flex items-center justify-center relative overflow-hidden group">
                        <input type="file" id="startFrame" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div id="start-placeholder" class="text-center text-gray-500 group-hover:text-indigo-400 transition-colors">
                            <i class="fa-solid fa-cloud-arrow-up text-2xl"></i><p class="text-xs mt-2">Upload Image</p>
                        </div>
                        <img id="start-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                        <button type="button" id="clear-start" class="hidden absolute top-2 right-2 z-20 bg-black/50 text-white rounded-full p-1 w-8 h-8 flex items-center justify-center hover:bg-red-500"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-300 flex justify-between">
                        <span><i class="fa-solid fa-image text-purple-400"></i> End Frame</span>
                        <span class="text-xs text-gray-500">(Optional)</span>
                    </label>
                    <div class="upload-zone rounded-xl h-40 flex items-center justify-center relative overflow-hidden group">
                        <input type="file" id="endFrame" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div id="end-placeholder" class="text-center text-gray-500 group-hover:text-purple-400 transition-colors">
                            <i class="fa-solid fa-cloud-arrow-up text-2xl"></i><p class="text-xs mt-2">Upload Image</p>
                        </div>
                        <img id="end-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                        <button type="button" id="clear-end" class="hidden absolute top-2 right-2 z-20 bg-black/50 text-white rounded-full p-1 w-8 h-8 flex items-center justify-center hover:bg-red-500"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-300"><i class="fa-solid fa-pen-nib"></i> Scene Prompt (Required)</label>
                <textarea id="prompt" required rows="3" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm text-white focus:border-indigo-500 outline-none transition-colors" placeholder="e.g., A cinematic dolly zoom of a cyberpunk city in the rain, neon lights reflecting on the wet asphalt..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <select id="duration" class="bg-black/40 border border-white/10 rounded-xl p-3 text-sm text-white outline-none cursor-pointer hover:border-indigo-500 transition-colors">
                    <option value="5">5 Seconds</option>
                    <option value="8">8 Seconds</option>
                </select>
                <select id="resolution" class="bg-black/40 border border-white/10 rounded-xl p-3 text-sm text-white outline-none cursor-pointer hover:border-indigo-500 transition-colors">
                    <option value="720p">720p HD</option>
                    <option value="1080p">1080p FHD</option>
                </select>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-4 rounded-xl font-bold text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 transition-all shadow-[0_0_20px_rgba(79,70,229,0.3)] hover:shadow-[0_0_25px_rgba(79,70,229,0.5)] flex justify-center items-center gap-2 transform active:scale-[0.99]">
                <i class="fa-solid fa-clapperboard"></i> Generate Video
            </button>
        </form>

        <div id="loading" class="hidden glass-panel rounded-2xl p-8 text-center space-y-6">
            <div class="relative w-20 h-20 mx-auto">
                <div class="absolute inset-0 border-4 border-indigo-500/20 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-indigo-500 rounded-full border-t-transparent animate-spin"></div>
                <i class="fa-solid fa-video absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-indigo-400"></i>
            </div>
            <div>
                <h3 class="text-lg font-medium text-white">Synthesizing with Veo 3.1...</h3>
                <p class="text-sm text-gray-400 mt-2">Connecting to Render backend. This usually takes 1-3 minutes.</p>
                <p class="text-xs text-indigo-400 mt-1 font-mono">Do not close this window.</p>
            </div>
        </div>

        <div id="output" class="hidden glass-panel rounded-2xl p-6 space-y-4 animate-[fadeIn_0.5s_ease-out]">
            <h2 class="text-xl font-semibold flex items-center gap-2 text-white">
                <i class="fa-solid fa-check-circle text-green-400"></i> Generation Complete
            </h2>
            <div class="relative rounded-xl overflow-hidden border border-white/10 shadow-2xl bg-black">
                <video id="result-video" class="w-full aspect-video object-cover" controls autoplay loop playsinline></video>
            </div>
            <div class="flex gap-4">
                <button onclick="location.reload()" class="flex-1 py-3 rounded-xl bg-white/5 hover:bg-white/10 transition-colors text-sm font-medium text-white border border-white/10">
                    <i class="fa-solid fa-rotate-left"></i> Create Another
                </button>
                <a id="download-btn" href="#" download="veo_cinematic.mp4" class="flex-1 text-center py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 transition-colors text-sm font-medium text-white shadow-lg shadow-indigo-500/20">
                    <i class="fa-solid fa-download"></i> Download MP4
                </a>
            </div>
        </div>
    </main>

    <script>
        // Setup Image Previews & Clear Buttons
        function setupPreview(inputId, previewId, placeholderId, clearBtnId) {
            const input = document.getElementById(inputId);
            const clearBtn = document.getElementById(clearBtnId);
            
            input.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.getElementById(previewId);
                        img.src = e.target.result;
                        img.classList.remove('hidden');
                        document.getElementById(placeholderId).classList.add('hidden');
                        clearBtn.classList.remove('hidden');
                    }
                    reader.readAsDataURL(file);
                }
            });

            clearBtn.addEventListener('click', (e) => {
                e.preventDefault();
                input.value = ''; // Clear file
                document.getElementById(previewId).classList.add('hidden');
                document.getElementById(placeholderId).classList.remove('hidden');
                clearBtn.classList.add('hidden');
            });
        }

        setupPreview('startFrame', 'start-preview', 'start-placeholder', 'clear-start');
        setupPreview('endFrame', 'end-preview', 'end-placeholder', 'clear-end');

        // Handle Form Submission
        document.getElementById('video-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formEl = document.getElementById('video-form');
            const loadingEl = document.getElementById('loading');
            const outputEl = document.getElementById('output');
            const submitBtn = document.getElementById('submit-btn');

            // Build FormData
            const formData = new FormData();
            formData.append('prompt', document.getElementById('prompt').value);
            formData.append('duration', document.getElementById('duration').value);
            formData.append('resolution', document.getElementById('resolution').value);
            
            // Only append files if they exist (Veo 3.1 handles text perfectly)
            const startFile = document.getElementById('startFrame').files[0];
            const endFile = document.getElementById('endFrame').files[0];
            if (startFile) formData.append('startFrame', startFile);
            if (endFile) formData.append('endFrame', endFile);

            // Update UI State
            formEl.classList.add('hidden');
            loadingEl.classList.remove('hidden');
            outputEl.classList.add('hidden');

            try {
                // YOUR RENDER URL IS HARDCODED HERE
                const response = await fetch('https://vd-36pz.onrender.com/generate-video', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || "Server error occurred. Check Render logs.");
                }

                // Convert response to Blob (Video File)
                const blob = await response.blob();
                const videoUrl = URL.createObjectURL(blob);

                // Show Video
                const videoEl = document.getElementById('result-video');
                videoEl.src = videoUrl;
                document.getElementById('download-btn').href = videoUrl;
                
                loadingEl.classList.add('hidden');
                outputEl.classList.remove('hidden');

            } catch (error) {
                alert(`Generation Failed: ${error.message}\n\nIf it says "Failed to fetch", the process might have timed out on Render, but the video is likely still generating on the backend!`);
                loadingEl.classList.add('hidden');
                formEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
