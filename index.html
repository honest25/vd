<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veo Studio | Cinematic AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #030712; color: #f8fafc; }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .upload-zone { border: 2px dashed rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
        .upload-zone:hover { border-color: #6366f1; background: rgba(99, 102, 241, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4 bg-gradient-to-br from-gray-900 to-black">

    <main class="w-full max-w-4xl space-y-8">
        <header class="text-center">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">Veo Studio</h1>
            <p class="text-gray-400 mt-2">Cinematic Video Synthesis Pipeline</p>
        </header>

        <form id="video-form" class="glass-panel rounded-2xl p-8 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-300"><i class="fa-solid fa-image"></i> Start Frame</label>
                    <div class="upload-zone rounded-xl h-40 flex items-center justify-center relative overflow-hidden">
                        <input type="file" id="startFrame" accept="image/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div id="start-placeholder" class="text-center text-gray-500">
                            <i class="fa-solid fa-upload text-2xl"></i><p class="text-xs mt-2">Upload Image</p>
                        </div>
                        <img id="start-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-300"><i class="fa-solid fa-image text-purple-400"></i> End Frame</label>
                    <div class="upload-zone rounded-xl h-40 flex items-center justify-center relative overflow-hidden">
                        <input type="file" id="endFrame" accept="image/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div id="end-placeholder" class="text-center text-gray-500">
                            <i class="fa-solid fa-upload text-2xl"></i><p class="text-xs mt-2">Upload Image</p>
                        </div>
                        <img id="end-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-300"><i class="fa-solid fa-pen-nib"></i> Scene Prompt</label>
                <textarea id="prompt" required rows="3" class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-sm text-white focus:border-indigo-500 outline-none transition-colors" placeholder="Describe the cinematic motion..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <select id="duration" class="bg-black/50 border border-white/10 rounded-xl p-3 text-sm text-white outline-none">
                    <option value="5">5 Seconds</option>
                    <option value="8">8 Seconds</option>
                </select>
                <select id="resolution" class="bg-black/50 border border-white/10 rounded-xl p-3 text-sm text-white outline-none">
                    <option value="720p">720p HD</option>
                    <option value="1080p">1080p FHD</option>
                </select>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-4 rounded-xl font-bold text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 transition-all shadow-lg flex justify-center items-center gap-2">
                <i class="fa-solid fa-clapperboard"></i> Generate Video
            </button>
        </form>

        <div id="loading" class="hidden glass-panel rounded-2xl p-8 text-center space-y-4">
            <div class="animate-spin text-indigo-500 text-4xl"><i class="fa-solid fa-circle-notch"></i></div>
            <h3 class="text-lg font-medium">Generating video using Veo...</h3>
            <p class="text-sm text-gray-400">This usually takes a few minutes. Please wait.</p>
        </div>

        <div id="output" class="hidden glass-panel rounded-2xl p-6 space-y-4">
            <h2 class="text-xl font-semibold flex items-center gap-2"><i class="fa-solid fa-check-circle text-green-400"></i> Generation Complete</h2>
            <video id="result-video" class="w-full rounded-xl border border-white/10 bg-black aspect-video object-cover" controls autoplay loop playsinline></video>
            <a id="download-btn" href="#" download="veo_cinematic.mp4" class="block text-center w-full py-3 rounded-xl bg-white/10 hover:bg-white/20 transition-colors text-sm font-medium">
                <i class="fa-solid fa-download"></i> Download MP4
            </a>
        </div>
    </main>

    <script>
        // Handle Image Previews
        function setupPreview(inputId, previewId, placeholderId) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.getElementById(previewId);
                        img.src = e.target.result;
                        img.classList.remove('hidden');
                        document.getElementById(placeholderId).classList.add('hidden');
                    }
                    reader.readAsDataURL(file);
                }
            });
        }

        setupPreview('startFrame', 'start-preview', 'start-placeholder');
        setupPreview('endFrame', 'end-preview', 'end-placeholder');

        // Handle Form Submission
        document.getElementById('video-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formEl = document.getElementById('video-form');
            const loadingEl = document.getElementById('loading');
            const outputEl = document.getElementById('output');
            const submitBtn = document.getElementById('submit-btn');

            // Build FormData
            const formData = new FormData();
            formData.append('prompt', document.getElementById('prompt').value);
            formData.append('duration', document.getElementById('duration').value);
            formData.append('resolution', document.getElementById('resolution').value);
            formData.append('startFrame', document.getElementById('startFrame').files[0]);
            formData.append('endFrame', document.getElementById('endFrame').files[0]);

            // Update UI State
            formEl.classList.add('opacity-50', 'pointer-events-none');
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            loadingEl.classList.remove('hidden');
            outputEl.classList.add('hidden');

            try {
                // Call FastAPI Backend
                const response = await fetch('https://vd-36pz.onrender.com/generate-video', {
    method: 'POST',
    body: formData
});

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || "Server error occurred");
                }

                // Convert response to Blob (Video File)
                const blob = await response.blob();
                const videoUrl = URL.createObjectURL(blob);

                // Show Video
                const videoEl = document.getElementById('result-video');
                videoEl.src = videoUrl;
                document.getElementById('download-btn').href = videoUrl;
                
                loadingEl.classList.add('hidden');
                outputEl.classList.remove('hidden');

            } catch (error) {
                alert(`Error: ${error.message}`);
                loadingEl.classList.add('hidden');
            } finally {
                // Restore UI State
                formEl.classList.remove('opacity-50', 'pointer-events-none');
                submitBtn.innerHTML = '<i class="fa-solid fa-clapperboard"></i> Generate Video';
            }
        });
    </script>
</body>
</html>
